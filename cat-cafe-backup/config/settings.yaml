# Cat Café Multi-Agent System - Configuration

# Application settings
app_name: "Cat Café Multi-Agent System"
app_version: "0.1.0"
debug: false

# CLI tool paths
bollumao_cli_path: "./cli/bollumao.sh"
mainemao_cli_path: "./cli/mainemao.sh"
xianluomao_cli_path: "./cli/xianluomao.sh"

# Redis configuration
redis_host: "localhost"
redis_port: 6379
redis_db: 0
redis_password: null

# Database configuration
database_url: "sqlite:///./cat-cafe.db"
database_pool_size: 5
database_max_overflow: 10

# WebSocket configuration
websocket_host: "0.0.0.0"
websocket_port: 8765
websocket_heartbeat_interval: 30
websocket_max_connections: 100

# Session configuration
session_ttl_seconds: 3600
message_retention_days: 30

# Logging configuration
log_level: "INFO"
log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
