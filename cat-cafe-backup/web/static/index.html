<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Café - AI猫咪协作空间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app">
        <!-- Header with cat café branding -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🐱</span>
                <h1>Cat Café</h1>
            </div>
            <span class="subtitle">三只AI猫咪的协作空间</span>
            <div class="header-actions">
                <button id="theme-toggle" class="btn-icon" title="切换主题">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>
        
        <div class="app-body">
            <!-- Thread list sidebar -->
            <aside class="thread-list">
                <div class="sidebar-header">
                    <h2>对话列表</h2>
                    <button id="new-thread" class="btn-icon" title="新建对话">
                        <span>+</span>
                    </button>
                </div>
                <div id="threads" class="threads-container">
                    <!-- Threads will be populated here -->
                </div>
            </aside>
            
            <!-- Main chat area -->
            <main class="chat-area">
                <div class="chat-header">
                    <h3 id="current-thread-title">新对话</h3>
                    <span id="connection-status" class="status offline">●</span>
                </div>
                <div id="messages" class="messages">
                    <div class="welcome-message">
                        <div class="welcome-content">
                            <h2>欢迎来到 Cat Café 🐱</h2>
                            <p>在这里，三只可爱的AI猫咪正在等待你的召唤：</p>
                            <div class="agent-intro">
                                <div class="intro-item">
                                    <span class="intro-avatar ragdoll">🐱</span>
                                    <span><strong>布偶猫</strong> - 优雅的蓝眼睛绅士</span>
                                </div>
                                <div class="intro-item">
                                    <span class="intro-avatar maine">😺</span>
                                    <span><strong>缅因猫</strong> - 强壮的橙色探险家</span>
                                </div>
                                <div class="intro-item">
                                    <span class="intro-avatar siamese">🐈</span>
                                    <span><strong>暹罗猫</strong> - 机智的奶油色智者</span>
                                </div>
                            </div>
                            <p class="hint">输入 <code>@布偶猫</code> <code>@缅因猫</code> 或 <code>@暹罗猫</code> 来召唤它们吧！</p>
                        </div>
                    </div>
                </div>
                <div class="input-area">
                    <div id="typing-indicator" class="typing-indicator hidden">
                        <div class="typing-content">
                            <span class="typing-agent">🐱</span>
                            <span class="typing-text">正在输入</span>
                            <span class="typing-dots">
                                <span></span><span></span><span></span>
                            </span>
                        </div>
                    </div>
                    <div class="input-wrapper">
                        <div class="input-row">
                            <textarea 
                                id="message-input" 
                                placeholder="@布偶猫 @缅因猫 @暹罗猫 召唤猫咪..."
                                autocomplete="off"
                                rows="1"
                            ></textarea>
                            <div class="input-actions">
                                <button id="send-btn" class="btn-primary" title="发送">
                                    <span>发送</span>
                                </button>
                                <button id="stop-btn" class="btn-danger hidden" title="停止">
                                    <span>停止</span>
                                </button>
                            </div>
                        </div>
                        <!-- @mention autocomplete dropdown -->
                        <div id="mention-dropdown" class="mention-dropdown hidden">
                            <div class="mention-item" data-agent="ragdoll">
                                <span class="mention-avatar ragdoll">🐱</span>
                                <span class="mention-name">布偶猫</span>
                                <span class="mention-alias">@布偶猫</span>
                            </div>
                            <div class="mention-item" data-agent="maine">
                                <span class="mention-avatar maine">😺</span>
                                <span class="mention-name">缅因猫</span>
                                <span class="mention-alias">@缅因猫</span>
                            </div>
                            <div class="mention-item" data-agent="siamese">
                                <span class="mention-avatar siamese">🐈</span>
                                <span class="mention-name">暹罗猫</span>
                                <span class="mention-alias">@暹罗猫</span>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
            
            <!-- Agent status sidebar -->
            <aside class="agent-status">
                <h2>猫咪状态</h2>
                <div id="agent-list" class="agent-list">
                    <!-- Agent cards will be populated here -->
                    <div class="agent-card" data-agent="ragdoll" data-status="idle">
                        <div class="agent-avatar-wrapper">
                            <svg class="agent-avatar" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient id="ragdoll-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#e8eaf6"/>
                                        <stop offset="50%" style="stop-color:#c5cae9"/>
                                        <stop offset="100%" style="stop-color:#9fa8da"/>
                                    </linearGradient>
                                    <filter id="soft-shadow">
                                        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
                                    </filter>
                                </defs>
                                <!-- Body -->
                                <ellipse cx="50" cy="70" rx="30" ry="25" fill="url(#ragdoll-grad)" filter="url(#soft-shadow)"/>
                                <!-- Head -->
                                <circle cx="50" cy="40" r="22" fill="url(#ragdoll-grad)" filter="url(#soft-shadow)"/>
                                <!-- Ears -->
                                <path d="M28 28 L35 12 L48 22 Z" fill="#c5cae9"/>
                                <path d="M72 28 L65 12 L52 22 Z" fill="#c5cae9"/>
                                <!-- Inner ears -->
                                <path d="M32 25 L36 16 L44 22 Z" fill="#e8eaf6"/>
                                <path d="M68 25 L64 16 L56 22 Z" fill="#e8eaf6"/>
                                <!-- Eyes -->
                                <ellipse cx="43" cy="38" rx="5" ry="7" fill="#1a237e"/>
                                <ellipse cx="57" cy="38" rx="5" ry="7" fill="#1a237e"/>
                                <circle cx="44" cy="36" r="2" fill="white"/>
                                <circle cx="58" cy="36" r="2" fill="white"/>
                                <!-- Nose -->
                                <path d="M48 45 L52 45 L50 48 Z" fill="#ff8a80"/>
                                <!-- Mouth -->
                                <path d="M48 50 Q45 53 42 50" stroke="#7986cb" stroke-width="1.5" fill="none"/>
                                <path d="M52 50 Q55 53 58 50" stroke="#7986cb" stroke-width="1.5" fill="none"/>
                                <!-- Whiskers -->
                                <path d="M25 42 L38 44" stroke="#7986cb" stroke-width="1"/>
                                <path d="M25 47 L38 46" stroke="#7986cb" stroke-width="1"/>
                                <path d="M75 42 L62 44" stroke="#7986cb" stroke-width="1"/>
                                <path d="M75 47 L62 46" stroke="#7986cb" stroke-width="1"/>
                                <!-- Collar -->
                                <path d="M35 58 Q50 65 65 58" stroke="#5c6bc0" stroke-width="4" fill="none"/>
                                <circle cx="50" cy="62" r="4" fill="#ff6b6b"/>
                            </svg>
                        </div>
                        <div class="agent-info">
                            <h3>布偶猫</h3>
                            <p class="agent-desc">优雅的绅士</p>
                            <span class="agent-status-badge idle">空闲</span>
                        </div>
                    </div>
                    
                    <div class="agent-card" data-agent="maine" data-status="idle">
                        <div class="agent-avatar-wrapper">
                            <svg class="agent-avatar" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient id="maine-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#fff3e0"/>
                                        <stop offset="50%" style="stop-color:#ffcc80"/>
                                        <stop offset="100%" style="stop-color:#ff9800"/>
                                    </linearGradient>
                                    <filter id="soft-shadow">
                                        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
                                    </filter>
                                </defs>
                                <!-- Body -->
                                <ellipse cx="50" cy="72" rx="32" ry="26" fill="url(#maine-grad)" filter="url(#soft-shadow)"/>
                                <!-- Head -->
                                <circle cx="50" cy="40" r="24" fill="url(#maine-grad)" filter="url(#soft-shadow)"/>
                                <!-- Ears - larger and more pointed -->
                                <path d="M25 26 L32 5 L48 20 Z" fill="#ff9800"/>
                                <path d="M75 26 L68 5 L52 20 Z" fill="#ff9800"/>
                                <!-- Inner ears -->
                                <path d="M30 22 L33 10 L43 19 Z" fill="#ffe0b2"/>
                                <path d="M70 22 L67 10 L57 19 Z" fill="#ffe0b2"/>
                                <!-- Stripes on head -->
                                <path d="M38 20 L40 30 L42 20" fill="#e65100" opacity="0.6"/>
                                <path d="M48 18 L50 28 L52 18" fill="#e65100" opacity="0.6"/>
                                <path d="M58 20 L60 30 L62 20" fill="#e65100" opacity="0.6"/>
                                <!-- Eyes - gentle and wise -->
                                <ellipse cx="42" cy="38" rx="5" ry="6" fill="#3e2723"/>
                                <ellipse cx="58" cy="38" rx="5" ry="6" fill="#3e2723"/>
                                <circle cx="43" cy="36" r="1.5" fill="white"/>
                                <circle cx="59" cy="36" r="1.5" fill="white"/>
                                <!-- Nose -->
                                <ellipse cx="50" cy="46" rx="4" ry="3" fill="#ff8a65"/>
                                <!-- Mouth - gentle smile -->
                                <path d="M45 52 Q50 56 55 52" stroke="#e65100" stroke-width="2" fill="none"/>
                                <!-- Cheek fluff -->
                                <ellipse cx="28" cy="42" rx="6" ry="4" fill="#fff3e0" opacity="0.8"/>
                                <ellipse cx="72" cy="42" rx="6" ry="4" fill="#fff3e0" opacity="0.8"/>
                                <!-- Whiskers -->
                                <path d="M20 40 L35 42" stroke="#e65100" stroke-width="1.5"/>
                                <path d="M20 45 L35 45" stroke="#e65100" stroke-width="1.5"/>
                                <path d="M80 40 L65 42" stroke="#e65100" stroke-width="1.5"/>
                                <path d="M80 45 L65 45" stroke="#e65100" stroke-width="1.5"/>
                                <!-- Collar -->
                                <path d="M32 58 Q50 66 68 58" stroke="#e65100" stroke-width="4" fill="none"/>
                                <rect x="46" y="60" width="8" height="8" fill="#5d4037" rx="1"/>
                            </svg>
                        </div>
                        <div class="agent-info">
                            <h3>缅因猫</h3>
                            <p class="agent-desc">强壮的探险家</p>
                            <span class="agent-status-badge idle">空闲</span>
                        </div>
                    </div>
                    
                    <div class="agent-card" data-agent="siamese" data-status="idle">
                        <div class="agent-avatar-wrapper">
                            <svg class="agent-avatar" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient id="siamese-body" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#fafafa"/>
                                        <stop offset="100%" style="stop-color:#f5f5f5"/>
                                    </linearGradient>
                                    <linearGradient id="siamese-points" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#a1887f"/>
                                        <stop offset="100%" style="stop-color:#6d4c41"/>
                                    </linearGradient>
                                    <filter id="soft-shadow">
                                        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
                                    </filter>
                                </defs>
                                <!-- Body -->
                                <ellipse cx="50" cy="72" rx="28" ry="24" fill="url(#siamese-body)" filter="url(#soft-shadow)"/>
                                <!-- Body points (darker patches) -->
                                <ellipse cx="50" cy="78" rx="15" ry="10" fill="url(#siamese-points)" opacity="0.3"/>
                                <!-- Head -->
                                <circle cx="50" cy="40" r="20" fill="url(#siamese-body)" filter="url(#soft-shadow)"/>
                                <!-- Mask (darker face) -->
                                <ellipse cx="50" cy="42" rx="14" ry="12" fill="url(#siamese-points)"/>
                                <!-- Ears - large and pointed -->
                                <path d="M28 28 L32 8 L46 22 Z" fill="url(#siamese-points)"/>
                                <path d="M72 28 L68 8 L54 22 Z" fill="url(#siamese-points)"/>
                                <!-- Eyes - almond shaped, piercing blue -->
                                <path d="M38 38 Q42 34 46 38 Q42 42 38 38" fill="#00bcd4"/>
                                <path d="M54 38 Q58 34 62 38 Q58 42 54 38" fill="#00bcd4"/>
                                <circle cx="42" cy="38" r="1.5" fill="white"/>
                                <circle cx="58" cy="38" r="1.5" fill="white"/>
                                <!-- Nose -->
                                <path d="M48 44 L52 44 L50 47 Z" fill="#ffab91"/>
                                <!-- Mouth -->
                                <path d="M48 49 Q45 51 42 49" stroke="#6d4c41" stroke-width="1" fill="none"/>
                                <path d="M52 49 Q55 51 58 49" stroke="#6d4c41" stroke-width="1" fill="none"/>
                                <!-- Whiskers - prominent -->
                                <path d="M22 42 L38 44" stroke="#8d6e63" stroke-width="1"/>
                                <path d="M22 46 L38 46" stroke="#8d6e63" stroke-width="1"/>
                                <path d="M78 42 L62 44" stroke="#8d6e63" stroke-width="1"/>
                                <path d="M78 46 L62 46" stroke="#8d6e63" stroke-width="1"/>
                                <!-- Collar -->
                                <path d="M35 56 Q50 62 65 56" stroke="#5d4037" stroke-width="3" fill="none"/>
                                <circle cx="50" cy="59" r="3" fill="#ffd54f"/>
                            </svg>
                        </div>
                        <div class="agent-info">
                            <h3>暹罗猫</h3>
                            <p class="agent-desc">机智的智者</p>
                            <span class="agent-status-badge idle">空闲</span>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>
    
    <!-- Toast notifications container -->
    <div id="toast-container" class="toast-container"></div>
    
    <script src="js/components.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
