app_name: "Zoo Multi-Agent System"

animals:
  xueqiu:
    name: "雪球"
    species: "雪纳瑞"
    cli_path: "opencode"
    cli_args:
      - "run"

  liuliu:
    name: "六六"
    species: "虎皮鹦鹉(蓝)"
    cli_path: "claude"
    cli_args:
      - "-p"
      - "--output-format"
      - "stream-json"

  xiaohuang:
    name: "小黄"
    species: "虎皮鹦鹉(黄绿)"
    cli_path: "crush"
    cli_args:
      - "run"

# Redis configuration
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: null

# Database configuration
database:
  url: "sqlite+aiosqlite:///./zoo.db"

# WebSocket configuration
websocket:
  host: "0.0.0.0"
  port: 8000

# Application settings
app:
  debug: false
  log_level: "INFO"
